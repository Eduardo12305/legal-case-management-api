services:
  db:
    image: postgres:16-alpine
    container_name: advon-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-advon}
      POSTGRES_USER: ${POSTGRES_USER:-advon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-advon}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-advon} -d ${POSTGRES_DB:-advon}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: advon-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: ${PORT:-3000}
      NODE_ENV: ${NODE_ENV:-production}
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgresql://${POSTGRES_USER:-advon}:${POSTGRES_PASSWORD:-advon}@db:5432/${POSTGRES_DB:-advon}?schema=public
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:5173}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-no-reply@advon.local}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Advon}
      EMAIL_VERIFICATION_REQUIRED: ${EMAIL_VERIFICATION_REQUIRED:-false}
      PRISMA_DB_PUSH_ON_START: ${PRISMA_DB_PUSH_ON_START:-false}
    ports:
      - "${PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
